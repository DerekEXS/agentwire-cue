services:
  agentwire-core:
    build:
      context: ../agentwire_core
    image: agentwire-core:v1.5.6
    container_name: agentwire-core
    # v1.6.2: WSL2 环境下必须使用 host 网络模式
    #   - bridge 模式无法绑定 Tailscale IP (100.70.166.21) — 容器端口只能到 WSL localhost
    #   - bridge 模式绑定 0.0.0.0:18800 会与 Windows svchost (iphlpsvc) 端口冲突
    #   - host 模式下容器直接使用 WSL 网络栈，可正常接受 Tailscale 入站连接
    # 安全注意事项:
    #   - 容器失去网络隔离，18800 端口绑定到 WSL 所有网络接口
    #   - 生产环境请确保 WSL 防火墙仅放行 tailscale0 接口的入站连接
    #   - 标准 Linux 服务器部署建议改回 bridge 模式 + ports 端口映射
    network_mode: host
    volumes:
      - core_history:/data/history
      - core_peers:/data/peers
    secrets:
      - source: a2a-token
        target: a2a-token.txt
      - source: cue-admin-token
        target: cue-admin-token.txt
    environment:
      - CORE_LISTEN_HOST=0.0.0.0
      - CORE_LISTEN_PORT=18800
      - AGENTWIRE_TOKEN_FILE=/run/secrets/a2a-token.txt
      # v1.5.6: CUE real-time push (restores a2a_content_match native path)
      - CUE_FORWARD_URL=http://127.0.0.1:18801/a2a/inbound
      - CUE_FORWARD_ENABLED=1
      - CUE_FORWARD_TOKEN_FILE=/run/secrets/cue-admin-token.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18800/.well-known/agent.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  agentwire-cue:
    build:
      context: .
    image: agentwire-cue:v1.6.5
    container_name: agentwire-cue
    # v1.6.2: 跟随 CORE 用 host 网络模式（同样 WSL2 Tailscale 兼容原因）
    # 18801/19000 通过下方 ports 映射限制仅 host loopback 可达
    network_mode: host
    ports:
      - "127.0.0.1:${CUE_API_PORT:-18801}:18801"
      - "127.0.0.1:${CUE_ADMIN_PORT:-19000}:19000"
    volumes:
      - ./examples:/plugins:ro
      - cue_data:/data
    secrets:
      - source: a2a-token
        target: a2a-token.txt
      - source: cue-admin-token
        target: cue-admin-token.txt
      - source: peer-a-a2a-token
        target: peer-a-a2a-token.txt
    environment:
      # v1.6.3 (silk-thread hotfix): WSL+k8s+network_mode:host 下,
      #   `agentwire-core` service 名解析成 198.18.0.0/15 假 Service IP
      #   (TCP 握手后被 kernel RST). 两 service 共用 host 网络栈 → 直走 loopback.
      - CUE_CORE_URL=http://127.0.0.1:18800
      - CUE_ADMIN_TOKEN_FILE=/run/secrets/cue-admin-token.txt
      # v1.6.3 hotfix: a remote peer CORE (Tailscale IP example, real value in *.local overlay) uses its own A2A token.
      #   历史上曾以字面 env 落地 → 已改为 Docker secrets 文件模式
      #   (与 a2a-token.txt 同模式); cue.yaml 同步用 alias.token_file 引用.
      - PEER_A_A2A_TOKEN_FILE=/run/secrets/peer-a-a2a-token.txt
    healthcheck:
      test: ["CMD", "python3", "-m", "agentwire_cue", "doctor", "--no-network", "--a2a-listener-port", "18801", "--admin-port", "19000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      agentwire-core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  core_history:
  core_peers:
  cue_data:

secrets:
  a2a-token:
    file: ./secrets/a2a-token.txt
  cue-admin-token:
    file: ./secrets/cue-admin-token.txt
  peer-a-a2a-token:
    file: ./secrets/peer-a-a2a-token.txt

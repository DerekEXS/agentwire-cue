apiVersion: agentwire/v1.2
kind: plugin

# ============================================================================
# v1.6.4 example: owner-alert
# ============================================================================
# 用途: 任一 peer 收到含 urgent: 关键词 → send_a2a 给主 agent 路由
# 演示: history_change trigger + peers.X.history.last_inbound_contains()
#
# 本文件是 *示例模板*。所有真实 peer uuid / url / host / token 都必须走
# production.local.yaml (gitignored), 不要直接编辑本文件的占位符。
# 容器挂载时把 production.local.yaml 覆盖到 plugin 目录即可。
#
# 历史教训 (v1.6.3 token leak + v1.6.4 personal-info 清理):
#   * docker-compose.yml 不许出现字面 token
#   * examples/*.yaml 不许出现真实 peer uuid / IP / 主机名
#   * 任何上传到 git/release 的文件必须保证 owner 不能据此推断
#     "这位用户具体有个 agent 叫 X 跑在 Y 的某个 IP"
#
# 替换字段: 把 <set-me-*> 换成你自己的值就能本地跑通
# ============================================================================

metadata:
  name: owner-alert
  version: 1.6.4
  description: "v1.6.4 sanitized example. history_change trigger + peers alias + token_file. Real peer identifiers belong in production.local.yaml, not this file."

spec:
  # ------------------------------------------------------------------
  # Peer alias table
  # ------------------------------------------------------------------
  # Slot names below are *placeholders*. Replace the keys entirely or
  # override values via production.local.yaml.
  peers:
    remote_peer_a:
      uuid: "<set-me-remote_peer_a-uuid>"
      url: "http://<set-me-remote_peer_a-host>:18800"
      description: "<set-me-remote_peer_a description>"
      # Per-peer A2A token. Compose mounts secrets/<peer>-a2a-token.txt
      # into the container; cue.yaml references the in-container path.
      token_file: "/run/secrets/peer-a-a2a-token.txt"  # peer-a is one example slot; rename to match your actual peer aliases
    remote_peer_b:
      uuid: "<set-me-remote_peer_b-uuid>"
      url: "http://<set-me-remote_peer_b-host>:18800"
      description: "<set-me-remote_peer_b description>"
    main:
      uuid: "<set-me-main-uuid>"
      url: "http://127.0.0.1:18800"
      description: "主 agent 路由入口"

  triggers:
    - id: on-remote_peer_a-urgent
      type: history_change
      config:
        peer: "remote_peer_a"
        granularity: round
        poll_interval_seconds: 15

    - id: on-remote_peer_b-urgent
      type: history_change
      config:
        peer: "remote_peer_b"
        granularity: round
        poll_interval_seconds: 15

  statechart:
    initial: watching
    context:
      last_notified_round: 0

    states:
      watching:
        "on":
          history_change:
            target: watching
            # Replace peer alias keys to match your spec.peers entries.
            guard: "(peers.remote_peer_a.history.last_inbound_contains('urgent:') || peers.remote_peer_b.history.last_inbound_contains('urgent:')) && event.new_round > context.last_notified_round"
            actions:
              - type: set_context
                with:
                  last_notified_round: "{{event.new_round}}"
              - type: log
                with:
                  level: info
                  message: "[{{meta.name}}] round {{event.new_round}} from {{event.peer}} - sending alert"
              - type: send_a2a
                with:
                  peer: main
                  message:
                    type: A2A_MESSAGE
                    text: "🚨 {{event.peer}} 紧急: round {{event.new_round}}"
                  # workflow_pointer 通过 metadata 透传到对方 history
                  # Replace workflow_file / current_step etc. with your
                  # actual workflow values via production.local.yaml overlay.
                  metadata:
                    workflow_pointer:
                      workflow_file: "<set-me-workflow-filename>"
                      workflow_version: "<set-me-workflow-version>"
                      current_step: "<set-me-current-step>"
                      next_action: "review_and_approve"
                      next_agent: "main"
                      human_in_the_loop: true
                    alert:
                      severity: "high"
                      source_peer: "{{event.peer}}"

  secrets: []

  permissions:
    network:
      # Replace with your actual egress targets. NEVER put real public /
      # Tailscale / WAN IPs here — that's owner-identifying information.
      http_egress: ["localhost", "127.0.0.1", "<set-me-egress-hosts>"]
      raw_socket: false
    filesystem: []
    subprocess: { allow: [] }
    env: []
    peers:
      - id: main
        allow_messages: ["*"]
    timers: { max_concurrent: 1, min_interval_ms: 1000 }

# ============================================================================
# production.local.yaml convention
# ============================================================================
# Drop a file named `production.local.yaml` next to this cue.yaml. It must
# NOT be committed (gitignored). The CUE host loads any YAML under
# --plugin-dir, so on operator hosts:
#
#   cp examples/owner-alert/cue.yaml examples/owner-alert/production.local.yaml
#   $EDITOR examples/owner-alert/production.local.yaml  # fill in real values
#
# If both exist, load order is alphabetical; rename if you need ordering.
# README-DOCKER.md has a longer write-up of the overlay pattern.
# ============================================================================

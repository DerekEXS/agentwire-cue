apiVersion: agentwire/v1.2
kind: plugin

metadata:
  name: script-receiver
  version: 1.0.0
  description: |
    v1.6.4: 接收 peer A 的 A2A 脚本 → 保存文件 → 通知主 agent (peer `main`)。
    监听包含 "project:" 和 "scenes:" 关键词的入站消息，
    保存为 YAML 脚本文件，然后通过 send_a2a 通知初梦主 Agent。

spec:
  peers:
    main:
      uuid: "main-demo-uuid"
      url: "http://127.0.0.1:18800"
      description: "初梦主 Agent"

  triggers:
    - id: on-script-received
      type: a2a_content_match
      config:
        contains:
          - "project:"
          - "scenes:"
        min_match: 2

  statechart:
    initial: waiting
    states:
      waiting:
        type: final
        actions:
          - type: write_file
            with:
              path: "/tmp/agentwire-scripts/{{event.peer}}/script_{{event.timestamp}}.yaml"
              content: "{{event.text}}"

          - type: send_a2a
            with:
              peer: main
              message:
                text: |
                  收到脚本 from {{event.peer}}
                  已保存到: /tmp/agentwire-scripts/{{event.peer}}/
                  匹配关键词: {{event.matched_keywords}}/{{event.contains_count}}
                  请按后续 workflow 处理
              metadata:
                workflow_pointer:
                  workflow_file: "<set-me-workflow-filename>"
                  workflow_version: "<set-me-workflow-version>"
                  current_step: "<set-me-current-step>"
                  next_action: "review_script"
                  next_agent: "main"

  secrets: []

  permissions:
    network: { http_egress: [], raw_socket: false }
    filesystem:
      - path: /tmp/agentwire-scripts
        modes: [write]
    subprocess: { allow: [] }
    env: []
    peers:
      - main
    timers: { max_concurrent: 3, min_interval_ms: 1000 }

apiVersion: agentwire/v1.2
kind: plugin

# ============================================================================
# v1.6.5 example: script-receiver (real-time a2a_content_match via CORE push)
# ============================================================================
# 用途: Pawly 发送含 project: + scenes: 的脚本 → 保存文件 → 通知初梦主 agent
# 演示: a2a_content_match trigger — CORE v1.5.6 实时推送消息到 CUE listener
#
# 架构 (v1.5.6 修复后):
#   外部 Agent → CORE (18800) → _forward_to_cue() → CUE A2AListener (18801)
#   → a2a_content_match 实时 fire (不再轮询!)
#
# 历史: v1.6.1 首次引入 a2a_content_match 但因 CORE 无 push 通道而空转;
#   v1.6.5 Workaround 改用 history_change (轮询); v1.5.6 CORE 修复 push
#   后本 trigger 恢复为 a2a_content_match (实时).
#
# 替换字段: 把 <set-me-*> 换成你自己的值就能本地跑通
# ============================================================================

metadata:
  name: script-receiver
  version: 1.1.0
  description: "v1.6.5 CORE-v1.5.6 real-time: a2a_content_match trigger via CORE push. Real peer identifiers belong in production.local.yaml, not this file."

spec:
  # ------------------------------------------------------------------
  # Peer alias table
  # ------------------------------------------------------------------
  # Slot names below are *placeholders*. Replace the keys entirely or
  # override values via production.local.yaml.
  peers:
    remote_peer_a:
      uuid: "<set-me-remote_peer_a-uuid>"
      url: "http://<set-me-remote_peer_a-host>:18800"
      description: "<set-me-remote_peer_a description>"
      # Per-peer A2A token. Compose mounts secrets/<peer>-a2a-token.txt
      # into the container; cue.yaml references the in-container path.
      token_file: "/run/secrets/peer-a-a2a-token.txt"
    main:
      uuid: "main-demo-uuid"
      url: "http://127.0.0.1:18800"
      description: "主 agent 路由入口"

  triggers:
    - id: on-script-received
      type: a2a_content_match
      config:
        contains:
          - "project:"
          - "scenes:"
        min_match: 2

  statechart:
    initial: idle
    states:
      idle:
        type: final
        "on":
          content_match:
            target: idle
            actions:
              - type: write_file
                with:
                  path: "/home/agentwire/.local/share/agentwire-cue/scripts/script_{{event.message_id}}.yaml"
                  content: "{{event.text}}"

              - type: send_a2a
                with:
                  peer: main
                  message:
                    text: |
                      收到脚本 from {{event.peer}}
                      已匹配关键词: {{event.matched_keywords}}/{{event.contains_count}}
                      已保存到: /home/agentwire/.local/share/agentwire-cue/scripts/script_{{event.timestamp}}.yaml
                      请按后续 workflow 处理
                  metadata:
                    workflow_pointer:
                      workflow_file: "<set-me-workflow-filename>"
                      workflow_version: "<set-me-workflow-version>"
                      current_step: "<set-me-current-step>"
                      next_action: "review_script"
                      next_agent: "main"

  secrets: []

  permissions:
    network: { http_egress: [], raw_socket: false }
    filesystem:
      - path: /home/agentwire/.local/share/agentwire-cue/scripts/*
        modes: [write]
    subprocess: { allow: [] }
    env: []
    peers:
      - main
      - remote_peer_a
    timers: { max_concurrent: 3, min_interval_ms: 1000 }
